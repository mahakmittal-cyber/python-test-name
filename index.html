<script>
  // Remote submission config:
  // Set SUBMIT_ENDPOINT to your webhook/API URL (Google Apps Script / Formspree / Make / Pipedream etc.)
  const SUBMIT_ENDPOINT = "https://script.google.com/macros/s/AKfycbzKwCNrs8Crhp-l3o6AgY2Uh3wm5rtOXyclR5NO6dyeBH4GPZcFIIfkkKOY6s6M9p7g/exec";

  const questions = [
    {
      section: "Section A — Easy",
      difficulty: "Easy",
      marks: 2,
      title: "Q1 (2 marks)",
      text: "What is the difference between a list and a tuple in Python? Give one example of each."
    },
    {
      section: "Section A — Easy",
      difficulty: "Easy",
      marks: 2,
      title: "Q2 (2 marks)",
      text: "What will this code print and why? x = [1,2,3]; y = x; y.append(4); print(x)"
    },
    {
      section: "Section A — Easy",
      difficulty: "Easy",
      marks: 3,
      title: "Q3 (3 marks)",
      text: "Write a function that reverses a string without using built-in reverse methods."
    },
    {
      section: "Section A — Easy",
      difficulty: "Easy",
      marks: 4,
      title: "Q4 (4 marks)",
      text: "Count the frequency of each word in \"the cat sat on the mat the cat\" and print as a dictionary."
    },
    {
      section: "Section A — Easy",
      difficulty: "Easy",
      marks: 4,
      title: "Q5 (4 marks)",
      text: "Explain *args and **kwargs and write a function demonstrating both."
    },
    {
      section: "Section B — Medium",
      difficulty: "Medium",
      marks: 4,
      title: "Q6 (4 marks)",
      text: "Write a BankAccount class with deposit, withdraw, and balance methods. Balance cannot go below zero."
    },
    {
      section: "Section B — Medium",
      difficulty: "Medium",
      marks: 4,
      title: "Q7 (4 marks)",
      text: "Use list comprehension to get squares of even numbers from 1-50. Find their sum. One line each."
    },
    {
      section: "Section B — Medium",
      difficulty: "Medium",
      marks: 7,
      title: "Q8 (7 marks)",
      text: "Find the bug and fix it — def add_to_list(item, my_list=[]): my_list.append(item); return my_list called 3 times with 1, 2, 3."
    },
    {
      section: "Section C — Hard",
      difficulty: "Hard",
      marks: 5,
      title: "Q9 (5 marks)",
      text: "Write a timer decorator that measures execution time. Demo with sum of 1 to 1,000,000."
    },
    {
      section: "Section C — Hard",
      difficulty: "Hard",
      marks: 5,
      title: "Q10 (5 marks)",
      text: "Explain generators vs regular functions. Write a generator for Fibonacci up to n terms."
    },
    {
      section: "Section C — Hard",
      difficulty: "Hard",
      marks: 10,
      title: "Q11 (10 marks)",
      text: "Given a students list with name, grade, score — sort by score descending, filter below 50, group by grade with average score, return top scorer per grade."
    }
  ];

  const totalSeconds = 60 * 60;
  let timeLeft = totalSeconds;
  let timerId = null;
  let currentIndex = 0;
  const answers = new Array(questions.length).fill("");

  const startScreen = document.getElementById("startScreen");
  const testScreen = document.getElementById("testScreen");
  const summaryScreen = document.getElementById("summaryScreen");

  const startBtn = document.getElementById("startBtn");
  const timerEl = document.getElementById("timer");
  const progressText = document.getElementById("progressText");

  const sectionBadge = document.getElementById("sectionBadge");
  const difficultyBadge = document.getElementById("difficultyBadge");
  const questionTitle = document.getElementById("questionTitle");
  const questionText = document.getElementById("questionText");
  const answerInput = document.getElementById("answerInput");

  const dotsWrap = document.getElementById("dots");
  const prevBtn = document.getElementById("prevBtn");
  const nextBtn = document.getElementById("nextBtn");
  const submitBtn = document.getElementById("submitBtn");

  const summaryList = document.getElementById("summaryList");
  const copyBtn = document.getElementById("copyBtn");
  const bufferBtn = document.getElementById("bufferBtn");
  let bufferUsed = false;
  let submissionStatus = "";

  function formatTime(seconds) {
    const min = Math.floor(seconds / 60);
    const sec = seconds % 60;
    return `${String(min).padStart(2, "0")}:${String(sec).padStart(2, "0")}`;
  }

  function updateTimerUI() {
    timerEl.textContent = `Time Left: ${formatTime(timeLeft)}`;
    if (timeLeft <= 5 * 60) {
      timerEl.classList.add("danger");
    } else {
      timerEl.classList.remove("danger");
    }
  }

  function startTimer() {
    updateTimerUI();
    timerId = setInterval(() => {
      timeLeft -= 1;
      if (timeLeft <= 0) {
        timeLeft = 0;
        updateTimerUI();
        clearInterval(timerId);
        submitTest();
        return;
      }
      updateTimerUI();
    }, 1000);
  }

  function saveCurrentAnswer() {
    answers[currentIndex] = answerInput.value;
  }

  function difficultyClass(level) {
    if (level === "Easy") return "badge-easy";
    if (level === "Medium") return "badge-medium";
    return "badge-hard";
  }

  function renderDots() {
    dotsWrap.innerHTML = "";
    for (let i = 0; i < questions.length; i += 1) {
      const dot = document.createElement("button");
      dot.className = "dot";
      dot.textContent = String(i + 1);
      if (i === currentIndex) dot.classList.add("active");
      if (answers[i].trim().length > 0) dot.classList.add("answered");
      dot.addEventListener("click", () => {
        saveCurrentAnswer();
        currentIndex = i;
        renderQuestion();
      });
      dotsWrap.appendChild(dot);
    }
  }

  function renderQuestion() {
    const q = questions[currentIndex];
    progressText.textContent = `Question ${currentIndex + 1} of ${questions.length}`;

    sectionBadge.textContent = q.section;
    difficultyBadge.textContent = q.difficulty;
    difficultyBadge.className = `badge ${difficultyClass(q.difficulty)}`;

    questionTitle.textContent = q.title;
    questionText.textContent = q.text;
    answerInput.value = answers[currentIndex];

    prevBtn.disabled = currentIndex === 0;
    nextBtn.classList.toggle("hidden", currentIndex === questions.length - 1);
    submitBtn.classList.toggle("hidden", currentIndex !== questions.length - 1);

    renderDots();
  }

  function buildSummaryText() {
    return questions.map((q, i) => {
      const a = answers[i].trim() ? answers[i].trim() : "[No answer provided]";
      return `${q.title}: ${q.text}\nAnswer:\n${a}`;
    }).join("\n\n--------------------\n\n");
  }

  function renderSummary() {
    summaryList.innerHTML = "";

    if (submissionStatus) {
      const statusWrap = document.createElement("div");
      statusWrap.className = "summary-item";
      statusWrap.style.background = "#f8fafc";
      statusWrap.style.borderStyle = "dashed";
      statusWrap.textContent = submissionStatus;
      summaryList.appendChild(statusWrap);
    }

    questions.forEach((q, i) => {
      const wrap = document.createElement("div");
      wrap.className = "summary-item";

      const qEl = document.createElement("div");
      qEl.className = "summary-q";
      qEl.textContent = `${q.title}: ${q.text}`;

      const aEl = document.createElement("p");
      aEl.className = "summary-a";
      if (answers[i].trim()) {
        aEl.textContent = answers[i].trim();
      } else {
        aEl.textContent = "No answer provided.";
        aEl.classList.add("empty");
      }

      wrap.appendChild(qEl);
      wrap.appendChild(aEl);
      summaryList.appendChild(wrap);
    });
  }

  function submitTest() {
    saveCurrentAnswer();
    clearInterval(timerId);
    testScreen.classList.add("hidden");
    summaryScreen.classList.remove("hidden");
    renderSummary();
    submitAnswersRemotely();
  }

  async function submitAnswersRemotely() {
    if (!SUBMIT_ENDPOINT) {
      submissionStatus = "Remote submit not configured. Candidate can use 'Copy all answers' and share manually.";
      renderSummary();
      return;
    }

    const payload = {
      submittedAt: new Date().toISOString(),
      totalQuestions: questions.length,
      durationMinutes: 60,
      bufferUsed,
      questions: questions.map((q, i) => ({
        questionNumber: i + 1,
        section: q.section,
        difficulty: q.difficulty,
        marks: q.marks,
        title: q.title,
        question: q.text,
        answer: answers[i].trim()
      }))
    };

    try {
      // IMPORTANT: no custom headers to avoid preflight/CORS 405 on Apps Script.
      const res = await fetch(SUBMIT_ENDPOINT, {
        method: "POST",
        body: JSON.stringify(payload)
      });

      const raw = await res.text();

      if (!res.ok) {
        throw new Error(`HTTP ${res.status}: ${raw.slice(0, 180)}`);
      }

      submissionStatus = "Answers auto-submitted successfully.";
    } catch (err) {
      submissionStatus = `Auto-submit failed: ${err.message}. Use 'Copy all answers' to share manually.`;
    }

    renderSummary();
  }

  function applyBufferTime() {
    if (bufferUsed) return;
    timeLeft += 15 * 60;
    bufferUsed = true;
    bufferBtn.disabled = true;
    bufferBtn.textContent = "Buffer used";
    updateTimerUI();
  }

  startBtn.addEventListener("click", () => {
    startScreen.classList.add("hidden");
    testScreen.classList.remove("hidden");
    renderQuestion();
    startTimer();
  });

  prevBtn.addEventListener("click", () => {
    saveCurrentAnswer();
    if (currentIndex > 0) {
      currentIndex -= 1;
      renderQuestion();
    }
  });

  nextBtn.addEventListener("click", () => {
    saveCurrentAnswer();
    if (currentIndex < questions.length - 1) {
      currentIndex += 1;
      renderQuestion();
    }
  });

  submitBtn.addEventListener("click", submitTest);
  bufferBtn.addEventListener("click", applyBufferTime);

  answerInput.addEventListener("input", () => {
    answers[currentIndex] = answerInput.value;
    renderDots();
  });

  copyBtn.addEventListener("click", async () => {
    const text = buildSummaryText();
    try {
      await navigator.clipboard.writeText(text);
      copyBtn.textContent = "Copied";
    } catch (err) {
      const temp = document.createElement("textarea");
      temp.value = text;
      document.body.appendChild(temp);
      temp.select();
      document.execCommand("copy");
      document.body.removeChild(temp);
      copyBtn.textContent = "Copied";
    }
    setTimeout(() => {
      copyBtn.textContent = "Copy all answers";
    }, 1500);
  });
</script>
