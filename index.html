<script>
  const SUBMIT_ENDPOINT = "https://script.google.com/macros/s/AKfycbzKwCNrs8Crhp-l3o6AgY2Uh3wm5rtOXyclR5NO6dyeBH4GPZcFIIfkkKOY6s6M9p7g/exec";

  const questions = [
    { section: "Section A - Easy", difficulty: "Easy", marks: 2, title: "Q1 (2 marks)", text: "What is the difference between a list and a tuple in Python? Give one example of each." },
    { section: "Section A - Easy", difficulty: "Easy", marks: 2, title: "Q2 (2 marks)", text: "What will this code print and why? x = [1,2,3]; y = x; y.append(4); print(x)" },
    { section: "Section A - Easy", difficulty: "Easy", marks: 3, title: "Q3 (3 marks)", text: "Write a function that reverses a string without using built-in reverse methods." },
    { section: "Section A - Easy", difficulty: "Easy", marks: 4, title: "Q4 (4 marks)", text: "Count the frequency of each word in \"the cat sat on the mat the cat\" and print as a dictionary." },
    { section: "Section A - Easy", difficulty: "Easy", marks: 4, title: "Q5 (4 marks)", text: "Explain *args and **kwargs and write a function demonstrating both." },
    { section: "Section B - Medium", difficulty: "Medium", marks: 4, title: "Q6 (4 marks)", text: "Write a BankAccount class with deposit, withdraw, and balance methods. Balance cannot go below zero." },
    { section: "Section B - Medium", difficulty: "Medium", marks: 4, title: "Q7 (4 marks)", text: "Use list comprehension to get squares of even numbers from 1-50. Find their sum. One line each." },
    { section: "Section B - Medium", difficulty: "Medium", marks: 7, title: "Q8 (7 marks)", text: "Find the bug and fix it - def add_to_list(item, my_list=[]): my_list.append(item); return my_list called 3 times with 1, 2, 3." },
    { section: "Section C - Hard", difficulty: "Hard", marks: 5, title: "Q9 (5 marks)", text: "Write a timer decorator that measures execution time. Demo with sum of 1 to 1,000,000." },
    { section: "Section C - Hard", difficulty: "Hard", marks: 5, title: "Q10 (5 marks)", text: "Explain generators vs regular functions. Write a generator for Fibonacci up to n terms." },
    { section: "Section C - Hard", difficulty: "Hard", marks: 10, title: "Q11 (10 marks)", text: "Given a students list with name, grade, score - sort by score descending, filter below 50, group by grade with average score, return top scorer per grade." }
  ];

  const totalSeconds = 60 * 60;
  let timeLeft = totalSeconds, timerId = null, currentIndex = 0, bufferUsed = false, submissionStatus = "", submitted = false;
  const answers = new Array(questions.length).fill("");

  const startScreen = document.getElementById("startScreen");
  const testScreen = document.getElementById("testScreen");
  const summaryScreen = document.getElementById("summaryScreen");
  const startBtn = document.getElementById("startBtn");
  const timerEl = document.getElementById("timer");
  const progressText = document.getElementById("progressText");
  const sectionBadge = document.getElementById("sectionBadge");
  const difficultyBadge = document.getElementById("difficultyBadge");
  const questionTitle = document.getElementById("questionTitle");
  const questionText = document.getElementById("questionText");
  const answerInput = document.getElementById("answerInput");
  const dotsWrap = document.getElementById("dots");
  const prevBtn = document.getElementById("prevBtn");
  const nextBtn = document.getElementById("nextBtn");
  const submitBtn = document.getElementById("submitBtn");
  const summaryList = document.getElementById("summaryList");
  const copyBtn = document.getElementById("copyBtn");
  const bufferBtn = document.getElementById("bufferBtn");

  const formatTime = s => `${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;
  function updateTimerUI(){ timerEl.textContent = `Time Left: ${formatTime(timeLeft)}`; timerEl.classList.toggle("danger", timeLeft <= 300); }
  function startTimer(){ updateTimerUI(); timerId = setInterval(()=>{ timeLeft--; if(timeLeft<=0){ timeLeft=0; updateTimerUI(); clearInterval(timerId); submitTest(); return; } updateTimerUI(); },1000); }
  function saveCurrentAnswer(){ answers[currentIndex] = answerInput.value; }
  function difficultyClass(d){ return d==="Easy"?"badge-easy":d==="Medium"?"badge-medium":"badge-hard"; }

  function renderDots(){
    dotsWrap.innerHTML = "";
    for(let i=0;i<questions.length;i++){
      const dot = document.createElement("button");
      dot.className = "dot";
      dot.textContent = String(i+1);
      if(i===currentIndex) dot.classList.add("active");
      if(answers[i].trim()) dot.classList.add("answered");
      dot.addEventListener("click", ()=>{ saveCurrentAnswer(); currentIndex=i; renderQuestion(); });
      dotsWrap.appendChild(dot);
    }
  }

  function renderQuestion(){
    const q = questions[currentIndex];
    progressText.textContent = `Question ${currentIndex+1} of ${questions.length}`;
    sectionBadge.textContent = q.section;
    difficultyBadge.textContent = q.difficulty;
    difficultyBadge.className = `badge ${difficultyClass(q.difficulty)}`;
    questionTitle.textContent = q.title;
    questionText.textContent = q.text;
    answerInput.value = answers[currentIndex];
    prevBtn.disabled = currentIndex===0;
    nextBtn.classList.toggle("hidden", currentIndex===questions.length-1);
    submitBtn.classList.toggle("hidden", currentIndex!==questions.length-1);
    renderDots();
  }

  function buildSummaryText(){
    return questions.map((q,i)=>`${q.title}: ${q.text}\nAnswer:\n${answers[i].trim()||"[No answer provided]"}`).join("\n\n--------------------\n\n");
  }

  function renderSummary(){
    summaryList.innerHTML = "";
    if(submissionStatus){
      const s = document.createElement("div");
      s.className = "summary-item";
      s.style.background = "#f8fafc";
      s.style.borderStyle = "dashed";
      s.textContent = submissionStatus;
      summaryList.appendChild(s);
    }
    questions.forEach((q,i)=>{
      const wrap = document.createElement("div");
      wrap.className = "summary-item";
      const qEl = document.createElement("div");
      qEl.className = "summary-q";
      qEl.textContent = `${q.title}: ${q.text}`;
      const aEl = document.createElement("p");
      aEl.className = "summary-a";
      aEl.textContent = answers[i].trim() || "No answer provided.";
      if(!answers[i].trim()) aEl.classList.add("empty");
      wrap.appendChild(qEl); wrap.appendChild(aEl);
      summaryList.appendChild(wrap);
    });
  }

  function submitTest(){
    if(submitted) return;
    submitted = true;
    saveCurrentAnswer();
    clearInterval(timerId);
    testScreen.classList.add("hidden");
    summaryScreen.classList.remove("hidden");
    submissionStatus = "Submitting answers...";
    renderSummary();
    submitAnswersRemotely();
  }

  async function submitAnswersRemotely(){
    if(!SUBMIT_ENDPOINT){
      submissionStatus = "Remote submit not configured. Use 'Copy all answers' and share manually.";
      renderSummary(); return;
    }
    const payload = {
      submittedAt: new Date().toISOString(),
      totalQuestions: questions.length,
      durationMinutes: Math.round((totalSeconds-timeLeft)/60),
      timeLeftSeconds: timeLeft,
      bufferUsed,
      questions: questions.map((q,i)=>({questionNumber:i+1,section:q.section,difficulty:q.difficulty,marks:q.marks,title:q.title,question:q.text,answer:answers[i].trim()}))
    };
    try{
      const formData = new URLSearchParams();
      formData.append("payload", JSON.stringify(payload));
      await fetch(SUBMIT_ENDPOINT,{ method:"POST", mode:"no-cors", body:formData });
      submissionStatus = "Answers submitted. If they do not appear in the sheet, use 'Copy all answers' as backup.";
    }catch(err){
      submissionStatus = `Auto-submit failed: ${err.message}. Use 'Copy all answers' to share manually.`;
    }
    renderSummary();
  }

  function applyBufferTime(){ if(bufferUsed) return; timeLeft += 900; bufferUsed = true; bufferBtn.disabled = true; bufferBtn.textContent = "Buffer used"; updateTimerUI(); }

  if(startBtn) startBtn.addEventListener("click", ()=>{ startScreen.classList.add("hidden"); testScreen.classList.remove("hidden"); renderQuestion(); startTimer(); });
  if(prevBtn) prevBtn.addEventListener("click", ()=>{ saveCurrentAnswer(); if(currentIndex>0){ currentIndex--; renderQuestion(); } });
  if(nextBtn) nextBtn.addEventListener("click", ()=>{ saveCurrentAnswer(); if(currentIndex<questions.length-1){ currentIndex++; renderQuestion(); } });
  if(submitBtn) submitBtn.addEventListener("click", submitTest);
  if(bufferBtn) bufferBtn.addEventListener("click", applyBufferTime);
  if(answerInput) answerInput.addEventListener("input", ()=>{ answers[currentIndex]=answerInput.value; renderDots(); });

  if(copyBtn) copyBtn.addEventListener("click", async ()=>{
    const text = buildSummaryText();
    try{ await navigator.clipboard.writeText(text); copyBtn.textContent = "Copied"; }
    catch{
      const t=document.createElement("textarea"); t.value=text; document.body.appendChild(t); t.select(); document.execCommand("copy"); document.body.removeChild(t); copyBtn.textContent="Copied";
    }
    setTimeout(()=>{ copyBtn.textContent="Copy all answers"; },1500);
  });
</script>
